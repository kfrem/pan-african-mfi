[pytest]
DJANGO_SETTINGS_MODULE = config.test_settings
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    models: Tests for Django model fields and constraints
    serializers: Tests for DRF serializer validation
    api: Tests for REST API endpoints and business logic
    calculations: Tests for financial calculation accuracy
    compliance: Tests for KYC, AML, and regulatory compliance gates
    integration: Tests requiring full request/response cycle
